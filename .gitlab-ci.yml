    - python tests/tools/nikto/parser.py -f nikto.xml
    - python tests/tools/junit.py -t nikto -f nikto.xml
    - exit $( grep -c "OSVDB-" nikto.xml || true; )
  artifacts:
    when: always
    reports:
      junit: junit/junit_nikto.xml
    paths:
      - nikto.xml
    expire_in: 7 days

.nmap_dast_demo:
  stage: post-stage
  needs:
    - deploy_demo
  tags:
    - secure
  only:
    - tags
  when: on_success
  script:
    - nmap -oX nmap.xml -A -T4 --script nmap-vulners/ --stylesheet tests/tools/nmap/nmap.xsl $DEPLOY_SERVER_PMS_DEMO_GKE
    - xsltproc nmap.xml -o nmap.html

build_prod_image:
  stage: pre-prod
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "builder" "${BUILDER_PASS}" | base64 -w 0)\"}}}" > /kaniko/.docker/config.json

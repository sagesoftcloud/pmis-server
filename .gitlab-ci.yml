.nikto_dast_dev:
  stage: post-dev
  needs:
    - deploy_dev
  tags:
    - secure
  only:
    - tags
  when: on_success
  before_script:
    - mkdir junit
  script:
    - nikto -ask no -Tuning 1234567890abcedx -mutate 12345 -host http://$DEPLOY_SERVER_PMS_GKE/login -Format xml -output nikto.xml
    - pip2.7 install junit-xml-output
    - python tests/tools/nikto/parser.py -f nikto.xml
    - python tests/tools/junit.py -t nikto -f nikto.xml
    - exit $( grep -c "OSVDB-" nikto.xml || true; )
  artifacts:
    when: always
    reports:
      junit: junit/junit_nikto.xml
    paths:
      - nikto.xml
    expire_in: 7 days

.nmap_dast_dev:
  stage: post-dev
  needs:
    - deploy_dev
  tags:
    - secure
  only:
    - tags
  when: on_success
  script:
    - nmap -oX nmap.xml -A -T4 --script nmap-vulners/ --stylesheet tests/tools/nmap/nmap.xsl $DEPLOY_SERVER_PMS_GKE
    - xsltproc nmap.xml -o nmap.html
    - exit $( grep -c 'true' nmap.xml || true; )
  artifacts:
    when: always
    paths:
      - nmap.xml
      - nmap.html
    expire_in: 7 days

.wapiti_dast_dev:
  stage: post-dev
  needs:
    - deploy_dev
  tags:
    - secure
  only:
    - tags
  when: on_success
  script:
    - wapiti -l 2 --skip-crawl --no-bugreport -u http://$DEPLOY_SERVER_PMS_GKE/login -f html -o wapiti.html
    - wapiti -l 2 --skip-crawl --no-bugreport -u http://$DEPLOY_SERVER_PMS_GKE/login -f txt -o wapiti.txt
    - exit $( grep -c ':\s{1,}[1-9]{1}[0-9]{0,}' wapiti.txt || true; )
  artifacts:
    when: always
    paths:
      - wapiti.html
      - wapiti.txt
    expire_in: 7 days

build_demo_image:
  stage: pre-stage
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "builder" "${BUILDER_PASS}" | base64 -w 0)\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:demo-${CI_COMMIT_TAG}"
  when: manual
  only:
    - tags
  tags:
    - docker

kubectl_check_demo:
  stage: stage
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  only:
    - tags
  script:
    - kubectl config get-contexts
    - kubectl config use-context maroon-studios/phisci/pms-server:pms-server-demo
    - kubectl get pods --namespace=demo
    - kubectl get deployments pms-demo-backend --namespace=demo | grep -q 'deployments.apps "pms-demo-backend" not found' && exit 1 || exit 0
  allow_failure: false

deploy_demo:
  stage: stage
  when: manual
  needs:
    - build_demo_image
    - kubectl_check_demo
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  only:
    - tags
  environment:
    name: demonstration
    url: https://pms-demo-gcp.maroonstudios.com
  script:
    - echo ${CI_REGISTRY}
    - echo ${TAG}
    - kubectl config get-contexts
    - kubectl config use-context maroon-studios/phisci/pms-server:pms-server-demo
    - kubectl set image deployment pms-demo-backend pms-demo-server-image=${CI_REGISTRY_IMAGE}:demo-${CI_COMMIT_TAG} --namespace=demo

.nikto_dast_demo:
  stage: post-stage
  needs:
    - deploy_demo
  tags:
    - secure
  only:
    - tags
  when: on_success
  before_script:
    - mkdir junit
  script:
    - nikto -ask no -Tuning 1234567890abcedx -mutate 12345 -host http://$DEPLOY_SERVER_PMS_DEMO_GKE/login -Format xml -output nikto.xml

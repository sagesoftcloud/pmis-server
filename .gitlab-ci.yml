image: node:14

variables:
  DOCS_FOLDER: "docs"
  SPEC_TO_DISPLAY: "openapi.yaml"

stages:
  - pre-mr
  - post-mr
  - pre-dev
  - dev
  - post-dev
  - pre-stage
  - stage
  - post-stage
  - pre-prod
  - prod
  - post-prod

include:
  - template: Security/SAST.gitlab-ci.yml

sast:
  stage: pre-mr


semgrep-sast:
  stage: pre-mr
  cache: {}
  rules:
    - if: $CI_MERGE_REQUEST_ID

cache:
  paths:
    - node_modules/

jest:
  stage: pre-mr
  except:
    - tags
  only:
    refs:
      - merge_requests
    variables:
      - $CI_COMMIT_REF_PROTECTED
  tags:
    - node
  services:
    - mongo:4.4.3
  script:
    - npm i
    - npm i jest supertest jest-junit
    - npm run seed-user-roles
    - npm run seed-test-users
    - npm run test-cicd
  artifacts:
    when: always
    reports:
      junit:
        - junit.xml
    expire_in: 7 days

pages:
  stage: post-mr
  before_script:
    - npm install swagger-ui-dist@3.22.1
  script:
    - mkdir public
    - cp -rp node_modules/swagger-ui-dist/* public
    - cp -rp $DOCS_FOLDER/* public
    - sed -i "s#https://petstore\.swagger\.io/v2/swagger\.json#$SPEC_TO_DISPLAY#g" public/index.html
  artifacts:
    paths:
      - public
  only:
    - master


openapi: 3.0.0
info:
  title: Project Monitoring System (PMS) API
  description: API documentation for the PMS backend codebase.
  version: 1.0.0
  contact:
    name: API Support
    url: http://maroonstudios.com
    email: support@maroonstudios.com
servers:
  - url: http://localhost:3001/webapi
    description: Local instance
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Roles:
      type: string
      enum:
      - accountingOfficer
      - admin
      - budgetOfficer
      - cashier
      - director
      - guest
      - hrOfficer
      - inventoryOfficer
      - procurementOfficer
      - projectLeader
    CellphoneNumber:
      type: string
      example: '(+63)1234567890'
    GeneralError:
      type: object
      properties:
        message:
          type: string
    SmoketestEmail:
      type: object
      properties:
        message:
          type: string
          default: "Test email should have been sent."
    SmoketestUserCount:
      type: object
      properties:
        message:
          type: string
          example: "This count may include users for internal purposes."
        userCount:
          type: integer
          format: int32
          example: 3
    SmoketestGetCurrentTime:
      type: object
      properties:
        message:
          type: string
          example: "Current time successfully sent."
        currentTime:
          type: string
          example: "2022-07-28T02:02:09.594Z"
    User:
      type: object
      required:
        - employeeType
        - role
        - firstName
        - lastName
        - position
        - employeeId
        - department
        - immediateSupervisor
        - dateOfEmployment
        - dateOfBirth
        - email
        - mobileNumber
        - userRole
      properties:
        employeeType:
          type: string
          enum:
          - 'Probationary Employee'
          - 'Regular Employee'
          - 'Term Employee'
          - 'Project Employee'
        role:
          type: string
          enum:
          - 'IT Admin'
          - 'Budget Officer'
          - 'HR Officer'
          - 'Director'
          - 'Procurement Officer'
          - 'Supply and Inventory Officer'
          - 'Accounting Unit Head/Officer'
        firstName:
          type: string
          example: 'John'
        middleName:
          type: string
          example: 'Smith'
        lastName:
          type: string
          example: 'Doe'
        position:
          type: string
          example: 'Head'
        employeeId:
          type: string
          example: '123123'
        department:
          type: string
          example: '62d9f957940ba73bf6f1a061'
        immediateSupervisor:
          type: string
          example: 'average Joe'
        dateOfEmployment:
          type: string
          example: '2020-04-25'
        dateOfBirth:
          type: string
          example: '1990-04-25'
        email:
          type: string
          example: 'johndoe@email.com'
        mobileNumber:
          $ref: '#/components/schemas/CellphoneNumber'
        userRole:
          type: array
          items:
            type: string
            example: 'admin'

security:
  - bearerAuth: []
tags:
  - name: smoketest
    description: Api test
  - name: Account Management
    description: Management of the user's account
  - name: User Management
    description: Management of the users
paths:
  # smoketest
  /utilities/test:
    get:
      tags:
        - smoketest
      summary: Returns a generic test message.
      responses:
        200:
          description: "Hello, world!"
          content:
            application/json:
              schema:
                type: string
                default: "Hello, world!"
  /utilities/emailtest:
    get:
      tags:
        - smoketest
      summary: Returns a message that an email has been sent to a hard-coded email address.
      responses:
        200:
          description: "Test email should have been sent."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmoketestEmail'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
  /utilities/usercount:
    get:
      tags:
        - smoketest
      summary: Returns a message with the total number of users currently in the database.
      responses:
        200:    # status code
          description: A message with the total number of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmoketestUserCount'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'
  /utilities/getCurrentTime:
    get:
      tags:
        - smoketest
      summary: Returns a message with the current system time.
      responses:
        200:    # status code
          description: A message with the current system time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmoketestGetCurrentTime'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralError'

  # Account Management
  /user/account/login:
    post:
      tags:
        - Account Management
      summary: Create JWT token with username and password.
      security: []
      operationId: userLogin
      description: Login with username and password and creates a session.
      responses:
        200:
          description: OK
        400:
          description: Bad Request. Invalid credentials.
      requestBody:
        description: Login with username and password.
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: 'user@mail.com'
                password:
                  type: string
                  example: 'RaGpKJhZ@764'
  /user/account/logout:
    get:
      tags:
        - Account Management
      summary: Logout user.
      security:
        - bearerAuth: []
      operationId: userLogout
      description: Logout user.
      responses:
        200:
          description: OK
        403:
          description: Forbidden. User has no token.
  /user/account/createsession:
    post:
      tags:
        - Account Management
      summary: Creates a new session for guest.
      operationId: createsession
      description: Creates a new session for guest.
      responses:
        201:
          description: Created. Guest session created.
        400:
          description: Error
  /user/password/requestchange:
    post:
      tags:
        - Account Management
      summary: Request for password change.
      security:
        - bearerAuth: []
      operationId: requestChange
      description: Request for password change then receive an otp.
      responses:
        200:
          description: OK
        400:
          description: Bad Request. Invalid credentials.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  example: 'maroon12345'
        description: Request for password change.
  /user/password/change:
    post:
      tags:
        - Account Management
      summary: Change password.
      security:
        - bearerAuth: []
      operationId: changePassword
      description: Change password.
      responses:
        200:
          description: OK
        400:
          description: Bad Request.
        403:
          description: Forbidden.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: 'user@mail.com'
                password:
                  type: string
                  example: 'Maroon12345!'
                otp:
                  type: string
                  example:
                    '1234'
        description: Change password.
  /user/password/forgot:
    post:
      tags:
        - Account Management
      summary: Send a forgot password request.
      security:
        - bearerAuth: []
      operationId: forgotPassword
      description: Send a forgot password request.
      responses:
        200:
          description: OK
        400:
          description: Bad Request.
        403:
          description: Forbidden.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: 'user@mail.com'
        description: Send a forgot password request and receive OTP.
  /user/password/reset:
    get:
      tags:
        - Account Management
      summary: Checks if OTP and username matches.
      security:
        - bearerAuth: []
      operationId: resetPassword
      description: Checks if OTP and username matches.
      parameters:
        - in: query
          name: username
          schema:
            type: string
          required: true
        - in: query
          name: otp
          schema:
            type: string
          required: true
      responses:
        200:
          description: OK
        400:
          description: Bad Request.
        403:
          description: Forbidden.
  /user/myprofile:
    get:
      tags:
        - Account Management
      summary: View own profile.
      security:
        - bearerAuth: []
      operationId: viewOwnProfile
      description: View own profile.
      responses:
        200:
          description: OK
        400:
          description: Bad Request.
        403:
          description: Forbidden.
    patch:
      tags:
        - Account Management
      summary: Update own profile.
      security:
        - bearerAuth: []
      operationId: updateOwnProfile
      description: Update own profile.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                info:
                  type: object
                  properties:
                    mobileNumber:
                      type: string
                      example: '(+63)1234567891'
                    zoom:
                      type: integer
                      example: 80
        description: Send a forgot password request and receive OTP.

      responses:
        200:
          description: OK
        400:
          description: Bad Request.
        403:
          description: Forbidden.
  /attachment/user/{_id}/profilePicture:
    post:
      tags:
        - Account Management
      summary: Upload profile picture.
      operationId: postOwnProfilePicture
      description: Upload profile picture.
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        403:
          description: Forbidden
      parameters:
        - in: path
          name: _id
          description: ObjectID of User.
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
  /attachment/user/{_id}/profilePicture/{_fileName}:
    get:
      tags:
        - Account Management
      summary: Download profile picture.
      operationId: getOwnProfilePicture
      description: Download profile picture.
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        403:
          description: Forbidden
      parameters:
        - in: path
          name: _id
          description: ObjectID of User.
          required: true
          schema:
            type: string
        - in: path
          name: _fileName
          description: Name of the file.
          required: true
          schema:
            type: string
    delete:
      tags:
        - Account Management
      summary: Delete profile picture.
      operationId: deleteOwnProfilePicture
      description: Delete profile picture.
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        403:
          description: Forbidden
      parameters:
        - in: path
          name: _id
          description: ObjectID of User.
          required: true
          schema:
            type: string
        - in: path
          name: _fileName
          description: Name of the file.
          required: true
          schema:
            type: string

  # User Management
  /admin/users:
    get:
      tags:
        - User Management
      summary: View all users.
      operationId: viewUsers
      description: View all users from the database.
      responses:
        200:
          description: Total Count and Object/s in JSON format.
        400:
          description: Invalid input.
      parameters:
        - in: query
          name: key
          description: Pass an optional key for looking up users. <code>value</code> must be supplied for it to work.
          required: false
          schema:
            type: string
        - in: query
          name: value
          description: Pass an optional value for looking up users. <code>key</code> must be supplied for it to work.
          required: false
          schema:
            type: string
        - in: query
          name: advancedQuery
          description: Pass an optional query string to show matching models. Make sure that your JSON Object is URIEncoded.
          required: false
          schema:
            type: string
        - in: query
          name: sortBy
          description: An optional query to sort data view by the passed value.
          required: false
          schema:
            type: string
        - in: query
          name: asc
          description: Pass <code>1</code> if sort data in an ascending order, <code>0</code> if descending.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 1
        - in: query
          name: total
          description: Pass <code>true</code> to display count of results, <code>false</code> to hide.
          required: false
          schema:
            type: boolean
        - in: query
          name: start
          description: Number of user records to skip for pagination.
          schema:
            type: integer
            format: int32
            minimum: 0
        - in: query
          name: count
          description: Maximum number of user records to return.
          schema:
            type: integer
            format: int32
            minimum: 0
        - in: query
          name: dataview
          description: Toggle user list view based on passed settings.
          required: true
          example: default
          schema:
            type: string
            enum:
              - default
              - table
              - projectUsers
              - archivedUsers
        - in: query
          name: search
          description: Pass optional search string for looking up users from database.
          required: false
          schema:
            type: string
    post:
      tags:
        - User Management
      summary: Creates a new user.
      operationId: createUser
      description: Creates a new user and adds it to the database.
      responses:
        201:
          description: User has been created.
        400:
          description: User creation error.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                info:
                  $ref: '#/components/schemas/User'
  /admin/users/{_userRole}:
    get:
      tags:
        - User Management
      summary: View all users with selected user role.
      operationId: viewUsersWithRole
      description: View all users with selected user role from the database.
      parameters:
        - in: path
          name: _userRole
          description: User's role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
        - in: query
          name: key
          description: Pass an optional key for looking up users. <code>value</code> must be supplied for it to work.
          required: false
          schema:
            type: string
        - in: query
          name: value
          description: Pass an optional value for looking up users. <code>key</code> must be supplied for it to work.
          required: false
          schema:
            type: string
        - in: query
          name: advancedQuery
          description: Pass an optional query string to show matching models. Make sure that your JSON Object is URIEncoded.
          required: false
          schema:
            type: string
        - in: query
          name: sortBy
          description: An optional query to sort data view by the passed value.
          required: false
          schema:
            type: string
        - in: query
          name: asc
          description: Pass <code>1</code> if sort data in an ascending order, <code>0</code> if descending.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 1
        - in: query
          name: total
          description: Pass <code>true</code> to display count of results, <code>false</code> to hide.
          required: false
          schema:
            type: boolean
        - in: query
          name: start
          description: Number of user records to skip for pagination.
          schema:
            type: integer
            format: int32
            minimum: 0
        - in: query
          name: count
          description: Maximum number of user records to return.
          schema:
            type: integer
            format: int32
            minimum: 0
        - in: query
          name: dataview
          description: Toggle user list view based on passed settings.
          example: 'default'
          required: false
          schema:
            type: string
        - in: query
          name: search
          description: Pass optional search string for looking up users from database.
          required: false
          schema:
            type: string
      responses:
        200:
          description: Total Count and Object/s in JSON format.
        400:
          description: Invalid input.
    post:
      tags:
        - User Management
      summary: Creates a new user with selected role.
      operationId: createUserWithRole
      description: Creates a new user with selected role and adds it to the database.
      parameters:
        - in: path
          name: _userRole
          description: New user's role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
      responses:
        201:
          description: User has been created.
        400:
          description: User creation error.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/User'
  /admin/user/{_userRole}/{_id}:
    get:
      tags:
        - User Management
      summary: View user with user role and ID.
      operationId: viewUser
      description: View a specific user with user role and ID from the database.
      parameters:
        - in: path
          name: _userRole
          description: Pass user role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
        - in: path
          name: _id
          description: Pass user ID.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Object/s in JSON format and update history.
        400:
          description: Invalid input.
    patch:
      tags:
        - User Management
      summary: Updates user with user role and ID.
      operationId: updateUser
      description: Updates a specific user with user role and ID from the database.
      parameters:
        - in: path
          name: _userRole
          description: Pass user role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
        - in: path
          name: _id
          description: Pass user ID.
          required: true
          schema:
            type: string
      responses:
        200:
          description: User has been updated and Updated User in JSON format.
        400:
          description: Invalid input.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/User'
    delete:
      tags:
        - User Management
      summary: Deletes user with user role and ID.
      operationId: deleteUser
      description: Deletes a specific user with user role and ID from the database.
      parameters:
        - in: path
          name: _userRole
          description: Pass user role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
        - in: path
          name: _id
          description: Pass user ID.
          required: true
          schema:
            type: string
      responses:
        200:
          description: 'User has been deleted.'
        400:
          description: Invalid input.
  /admin/user/{_userRole}/{_id}/activate:
    patch:
      tags:
        - User Management
      summary: Activates a user.
      operationId: activateUser
      description: Activates user from the database.
      parameters:
        - in: path
          name: _userRole
          description: Pass user role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
        - in: path
          name: _id
          description: Pass user ID.
          required: true
          schema:
            type: string
      responses:
        200:
          description: User has been activated and activated user in JSON Object.
        400:
          description: Invalid input.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                activationReason: 'Activated for some reason.'
  /admin/user/{_userRole}/{_id}/deactivate:
    patch:
      tags:
        - User Management
      summary: Activates a user.
      operationId: deactivateUser
      description: Activates user from the database.
      parameters:
        - in: path
          name: _userRole
          description: Pass user role.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
        - in: path
          name: _id
          description: Pass user ID.
          required: true
          schema:
            type: string
      responses:
        200:
          description: User has been deactivated and deactivated user in JSON Object.
        400:
          description: Invalid input.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                deactivationReason: 'Deactivated for some reason.'

  # Role
  /config/roleaccess/session:
    get:
      tags:
        - Role
      summary: Check session privilege.
      operationId: checkSessionPrivilege
      description: Check session privilege from the database.
      responses:
        200:
          description: Object/s in JSON format.
        400:
          description: Invalid input.
  /config/roleaccess/{_userRole}:
    get:
      tags:
        - Role
      summary: View privilege summary of a user role.
      operationId: viewRolePrivilege
      description: View privilege summary of user role.
      parameters:
        - in: path
          name: _userRole
          description: Pass a user role to view privilege.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
      responses:
        200:
          description: Object/s in JSON format.
        400:
          description: Invalid input.
    patch:
      tags:
        - Role
      summary: Adds a privilege for a user role.
      operationId: addRolePrivilege
      description: Adds a privilege for a user role.
      parameters:
        - in: path
          name: _userRole
          description: Pass the user role to update.
          required: true
          schema:
            $ref: '#/components/schemas/Roles'
      responses:
        200:
          description: User role named `_userRole` has been updated.
        400:
          description: Invalid input.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                features: '/myprofile'
                label: 'user'
    delete:
      tags:
        - Role
      summary: Deletes a user role.
      operationId: deleteUserRole
      description: Deletes a user role.
      parameters:
        - in: path
          name: _userRole
          description: Pass the user role to delete.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Object/s in JSON format.
        400:
          description: Invalid input.
  /config/roleaccess/multiple/{_operation}:
    patch:
      tags:
        - Role
      summary: Bulk operates on roles.
      operationId: multipleOperateRole
      description: Bulk operates on roles.
      parameters:
        - in: path
          name: _operation
          description: Pass the operation.
          required: true
          schema:
            type: string
            enum:
              - delete
              - activate
      responses:
        200:
          description: User role(s) have been archived.
        400:
          description: User role not found.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                roles: [ 'createdRole' ]
  /config/roleaccess:
    get:
      tags:
        - Role
      summary: View all roles.
      operationId: viewAllRoles
      description: Views all roles from the database.
      parameters:
        - in: query
          name: key
          description: Pass an optional key for looking up roles. <code>value</code> must be supplied for it to work.
          required: false
          schema:
            type: string
        - in: query
          name: value
          description: Pass an optional value for looking up roles. <code>key</code> must be supplied for it to work.
          required: false
          schema:
            type: string
        - in: query
          name: advancedQuery
          description: Pass an optional query string to show matching roles. Make sure that your JSON Object is URIEncoded.
          required: false
          schema:
            type: string
        - in: query
          name: sortBy
          description: An optional query to sort data view by the passed value.
          required: false
          schema:
            type: string
        - in: query
          name: asc
          description: Pass <code>1</code> if sort data in an ascending order, <code>0</code> if descending.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 1
        - in: query
          name: total
          description: Pass <code>true</code> to display count of results, <code>false</code> to hide.
          required: false
          schema:
            type: boolean
        - in: query
          name: start
          description: Number of records to skip for pagination.
          schema:
            type: integer
            format: int32
            minimum: 0
        - in: query
          name: count
          description: Maximum number of records to return.
          schema:
            type: integer
            format: int32
            minimum: 0
        - in: query
          name: dataview
          description: Toggle data view based on passed settings.
          example: 'default'
          required: false
          schema:
            type: string
        - in: query
          name: search
          description: Pass optional search string for looking up roles from database.
          required: false
          schema:
            type: string
      responses:
        200:
          description: Total Count and Object/s in JSON format.
        400:
          description: Invalid input.
    post:
      tags:
        - Role
      summary: Creates a new role with default privileges.
      operationId: createUserRole
      description: Creates a new role with default privileges and adds it to the database.
      responses:
        201:
          description: User role named `roleName` has been created.
        400:
          description: User role creation error.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roleName:
                  type: string
                  example: Sample Role
